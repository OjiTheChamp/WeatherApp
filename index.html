<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather — oji the champ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #fff; overflow-x: hidden; }

body {
  background: linear-gradient(135deg, #4a90e2 0%, #7bb3f0 100%);
  min-height: 100vh;
  transition: background 1.5s ease;
  padding: 20px;
}

/* Dynamic backgrounds based on weather */
body.bg-clear-day   { background: linear-gradient(135deg, #2980b9 0%, #6dd5fa 50%, #ffd89b 100%); }
body.bg-clear-night { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
body.bg-cloudy      { background: linear-gradient(135deg, #757f9a 0%, #d7dde8 100%); }
body.bg-overcast    { background: linear-gradient(135deg, #485563 0%, #29323c 100%); }
body.bg-fog         { background: linear-gradient(135deg, #606c88 0%, #3f4c6b 100%); }
body.bg-rain        { background: linear-gradient(135deg, #283048 0%, #859398 100%); }
body.bg-storm       { background: linear-gradient(135deg, #232526 0%, #414345 100%); }
body.bg-snow        { background: linear-gradient(135deg, #e6dada 0%, #a5b1c2 100%); color: #2c3e50; }
body.bg-snow .card, body.bg-snow .hero { color: #2c3e50; }
body.bg-snow .label, body.bg-snow .sub, body.bg-snow .day-lo, body.bg-snow .day-name { color: rgba(44,62,80,0.7); }

/* Animated rain */
.rain-overlay, .snow-overlay { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; opacity: 0; transition: opacity 1s; }
.rain-overlay.active, .snow-overlay.active { opacity: 1; }
.drop { position: absolute; width: 2px; background: linear-gradient(transparent, rgba(255,255,255,0.6)); animation: fall linear infinite; }
.flake { position: absolute; color: #fff; font-size: 12px; animation: snowfall linear infinite; opacity: 0.8; }
@keyframes fall { 0% { transform: translateY(-100px); } 100% { transform: translateY(100vh); } }
@keyframes snowfall { 0% { transform: translateY(-50px) translateX(0); } 100% { transform: translateY(100vh) translateX(40px); } }

/* Blocky Roblox-style voxel world background (original art) */
.voxel-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; perspective: 800px; }
.voxel {
  position: absolute;
  transform-style: preserve-3d;
  animation: voxelFloat linear infinite;
  opacity: 0.55;
}
.voxel .face { position: absolute; width: 100%; height: 100%; }
.voxel .top   { transform: rotateX(90deg) translateZ(var(--half)); filter: brightness(1.25); }
.voxel .front { transform: translateZ(var(--half)); }
.voxel .side  { transform: rotateY(90deg) translateZ(var(--half)); filter: brightness(0.7); }
@keyframes voxelFloat {
  0%   { transform: translateY(110vh) rotateX(35deg) rotateY(0deg); }
  100% { transform: translateY(-30vh) rotateX(35deg) rotateY(360deg); }
}

/* Original blocky voxel characters standing along the bottom */
.char-row { position: fixed; bottom: 0; left: 0; right: 0; z-index: 0; pointer-events: none;
  display: flex; justify-content: space-around; align-items: flex-end; padding: 0 4%; opacity: 0.85; }
.blocky { position: relative; width: 54px; animation: bob 2.6s ease-in-out infinite; }
.blocky .head  { width: 36px; height: 32px; margin: 0 auto; border-radius: 3px; position: relative; }
.blocky .face-dot { position: absolute; width: 5px; height: 6px; background: #1a1a1a; top: 12px; border-radius: 1px; }
.blocky .eye-l { left: 8px; } .blocky .eye-r { right: 8px; }
.blocky .torso { width: 44px; height: 30px; margin: 2px auto 0; border-radius: 3px; }
.blocky .legs  { display: flex; gap: 4px; justify-content: center; margin-top: 1px; }
.blocky .leg   { width: 18px; height: 22px; border-radius: 2px; }
.blocky .arms  { position: absolute; top: 34px; width: 100%; display: flex; justify-content: space-between; }
.blocky .arm   { width: 12px; height: 28px; border-radius: 2px; }
.blocky .hat   { width: 40px; height: 10px; margin: 0 auto -2px; border-radius: 3px 3px 1px 1px; position: relative; z-index: 2; }
.blocky .brim  { width: 30px; height: 5px; margin: 0 auto; border-radius: 2px; }
.blocky .glow-eye { box-shadow: 0 0 6px 2px currentColor; }
@keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@media (max-width: 600px) { .blocky { width: 40px; transform: scale(0.8); } .char-row { padding: 0 2%; } }

.app { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

/* Header & search */
.header { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 200px; display: flex; gap: 8px; }
.search-box input {
  flex: 1; padding: 12px 16px; border: none; border-radius: 12px;
  background: rgba(255,255,255,0.2); color: #fff; font-size: 15px;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.search-box input::placeholder { color: rgba(255,255,255,0.7); }
.search-box input:focus { outline: 2px solid rgba(255,255,255,0.5); }
.btn {
  padding: 12px 16px; border: none; border-radius: 12px; cursor: pointer;
  background: rgba(255,255,255,0.2); color: inherit; font-size: 14px; font-weight: 500;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: background 0.2s, transform 0.1s;
}
.btn:hover { background: rgba(255,255,255,0.3); }
.btn:active { transform: scale(0.96); }
.btn-icon { padding: 12px; min-width: 44px; }

/* Favorites bar */
.favs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
.favs::-webkit-scrollbar { height: 4px; }
.favs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }
.fav {
  padding: 8px 14px; border-radius: 20px; background: rgba(255,255,255,0.15);
  font-size: 13px; cursor: pointer; white-space: nowrap; border: none; color: inherit;
  display: inline-flex; align-items: center; gap: 6px;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.fav:hover { background: rgba(255,255,255,0.25); }
.fav.active { background: rgba(255,255,255,0.35); font-weight: 500; }
.fav-remove { opacity: 0.7; font-size: 14px; line-height: 1; padding: 0 2px; cursor: pointer; }
.fav-add { background: rgba(255,255,255,0.1); border: 1px dashed rgba(255,255,255,0.4); }

/* Hero */
.hero {
  background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 20px; padding: 24px; margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
}
.location { font-size: 14px; opacity: 0.85; margin-bottom: 6px; }
.temp { font-size: 64px; font-weight: 300; line-height: 1; }
.condition { font-size: 16px; opacity: 0.9; margin-top: 8px; }
.hero-icon { font-size: 88px; }
.sun-times { font-size: 12px; opacity: 0.8; margin-top: 10px; display: flex; gap: 14px; }

/* Cards grid */
.grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px; margin-bottom: 14px;
}
.card {
  background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 14px; padding: 14px;
}
.label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.val { font-size: 22px; font-weight: 500; }
.sub { font-size: 12px; opacity: 0.75; margin-top: 2px; }

/* Section titles */
.section-title { font-size: 13px; font-weight: 500; opacity: 0.85; margin: 16px 0 8px; padding-left: 4px; }

/* Hourly */
.hourly-wrap {
  background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 14px; padding: 14px; overflow-x: auto;
}
.hourly { display: flex; gap: 12px; min-width: max-content; }
.hour { text-align: center; min-width: 56px; }
.hour-time { font-size: 11px; opacity: 0.8; }
.hour-icon { font-size: 22px; margin: 6px 0; }
.hour-temp { font-size: 14px; font-weight: 500; }
.hour-rain { font-size: 10px; opacity: 0.75; margin-top: 2px; color: #a0d8ff; }

/* AQI */
.aqi-card {
  background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 14px; padding: 16px; margin-bottom: 14px;
}
.aqi-header { display: flex; justify-content: space-between; align-items: baseline; }
.aqi-val { font-size: 28px; font-weight: 500; }
.aqi-label { font-size: 14px; font-weight: 500; padding: 4px 10px; border-radius: 12px; }
.aqi-bar { height: 8px; background: rgba(0,0,0,0.2); border-radius: 4px; margin: 10px 0; overflow: hidden; }
.aqi-fill { height: 100%; border-radius: 4px; transition: width 0.5s, background 0.5s; }
.pollutants { display: grid; grid-template-columns: repeat(auto-fit, minmax(95px, 1fr)); gap: 8px; margin-top: 10px; }
.poll { background: rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 10px; }
.poll-name { font-size: 11px; opacity: 0.8; }
.poll-val { font-size: 13px; font-weight: 500; margin-top: 2px; }
.poll-unit { font-size: 9px; opacity: 0.65; font-weight: 400; }

/* Forecast */
.forecast { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; }
.day {
  background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 12px; padding: 12px 4px; text-align: center;
}
.day-name { font-size: 11px; opacity: 0.85; }
.day-icon { font-size: 26px; margin: 6px 0; }
.day-hi { font-size: 14px; font-weight: 500; }
.day-lo { font-size: 12px; opacity: 0.7; }

/* Status */
.status { text-align: center; padding: 40px 20px; font-size: 14px; opacity: 0.9; }
.error { color: #ffb4b4; }

.hidden { display: none !important; }

/* Modal for adding favorite */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: #2c3e50; color: #fff; padding: 24px; border-radius: 16px; width: 90%; max-width: 360px; }
.modal h3 { margin-bottom: 12px; font-size: 18px; }
.modal input { width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.1); color: #fff; font-size: 14px; margin-bottom: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* Weather icon shapes */
.wicon { display: inline-block; line-height: 1; }

@media (max-width: 600px) {
  .temp { font-size: 52px; }
  .hero-icon { font-size: 64px; }
  /* Show all 7 days as a horizontal scroll strip instead of hiding days */
  .forecast {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
    padding-bottom: 4px;
  }
  .forecast .day {
    flex: 0 0 auto;
    min-width: 64px;
    scroll-snap-align: start;
  }
  .forecast::-webkit-scrollbar { height: 4px; }
  .forecast::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }
}

/* Tablet: slightly tighter hero, keep 7-day grid */
@media (min-width: 601px) and (max-width: 820px) {
  .grid { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
}
</style>
</head>
<body>

<div class="voxel-bg" id="voxel-bg" aria-hidden="true"></div>
<div class="char-row" id="char-row" aria-hidden="true"></div>
<div class="rain-overlay" id="rain-overlay"></div>
<div class="snow-overlay" id="snow-overlay"></div>

<div class="app">
  <div class="header">
    <div class="search-box">
      <input id="search-input" type="text" placeholder="Search city..." aria-label="Search for a city">
      <button class="btn" id="search-btn" aria-label="Search">Search</button>
    </div>
    <button class="btn btn-icon" id="geo-btn" title="Use my location" aria-label="Use my location">📍</button>
    <button class="btn" id="unit-btn" aria-label="Toggle temperature units">°C</button>
    <button class="btn" id="mode-btn" title="Toggle city average vs center only" aria-label="Toggle city average or center only">🌆 City avg</button>
  </div>

  <div class="favs" id="favs"></div>

  <div id="status" class="status" role="status" aria-live="polite">Loading weather...</div>

  <div id="content" class="hidden">
    <div class="hero">
      <div>
        <div class="location" id="loc">—</div>
        <div class="local-clock" id="local-clock" style="font-size:13px;opacity:0.9;margin:2px 0 6px;letter-spacing:0.5px;">🕐 —</div>
        <div class="temp"><span id="temp">—</span><span id="temp-unit">°</span></div>
        <div class="temp-spread" id="temp-spread" style="display:none;font-size:12px;opacity:0.8;margin-top:4px;">—</div>
        <div class="condition" id="cond">—</div>
        <div class="sun-times">
          <span>🌅 <span id="sunrise">—</span></span>
          <span>🌇 <span id="sunset">—</span></span>
        </div>
        <button class="btn" id="points-toggle" style="margin-top:10px;font-size:12px;padding:6px 12px;display:none;">📍 Show sample points</button>
      </div>
      <div class="hero-icon" id="hero-icon">☀️</div>
    </div>

    <div id="points-panel" class="hidden" style="background:rgba(255,255,255,0.12);border-radius:14px;padding:14px;margin-bottom:14px;">
      <div style="font-size:12px;opacity:0.85;margin-bottom:8px;">Individual readings the city average is built from:</div>
      <div id="points-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;"></div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">🌡️ Feels like</div>
        <div class="val"><span id="feels">—</span><span class="tu">°</span></div>
      </div>
      <div class="card">
        <div class="label">💧 Humidity</div>
        <div class="val" id="hum">—</div>
      </div>
      <div class="card">
        <div class="label">📊 Pressure</div>
        <div class="val" id="press">—</div>
      </div>
      <div class="card">
        <div class="label">☀️ UV index</div>
        <div class="val" id="uv">—</div>
        <div class="sub" id="uv-label">—</div>
      </div>
    </div>

    <div class="section-title">Next 24 hours</div>
    <div class="hourly-wrap">
      <div class="hourly" id="hourly"></div>
    </div>

    <div class="section-title">Air quality</div>
    <div class="aqi-card">
      <div class="aqi-header">
        <div class="aqi-val" id="aqi">—</div>
        <div class="aqi-label" id="aqi-label">—</div>
      </div>
      <div class="aqi-bar"><div class="aqi-fill" id="aqi-fill" style="width:0%"></div></div>
      <div class="pollutants" id="pollutants"></div>
    </div>

    <div class="section-title">7-day forecast</div>
    <div class="forecast" id="forecast"></div>
  </div>
</div>

<div id="modal-bg" class="modal-bg hidden">
  <div class="modal">
    <h3>Save this city?</h3>
    <p style="font-size:13px;opacity:0.8;margin-bottom:12px;" id="modal-city">—</p>
    <div class="modal-actions">
      <button class="btn" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-save" style="background:rgba(100,200,150,0.4);">Save</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let useF = false;
let currentData = null;
let favorites = JSON.parse(localStorage.getItem('weather_favs') || '[]');

const weatherCodes = {
  0:  {label:'Clear sky',         emoji:'☀️', bg:'clear-day',   night:'🌙'},
  1:  {label:'Mainly clear',      emoji:'🌤️', bg:'clear-day',   night:'🌙'},
  2:  {label:'Partly cloudy',     emoji:'⛅',  bg:'cloudy',      night:'☁️'},
  3:  {label:'Overcast',          emoji:'☁️', bg:'overcast',    night:'☁️'},
  45: {label:'Fog',               emoji:'🌫️', bg:'fog'},
  48: {label:'Rime fog',          emoji:'🌫️', bg:'fog'},
  51: {label:'Light drizzle',     emoji:'☁️💧', bg:'rain'},
  53: {label:'Drizzle',           emoji:'☁️💧', bg:'rain'},
  55: {label:'Heavy drizzle',     emoji:'🌧️💧', bg:'rain'},
  61: {label:'Light rain',        emoji:'🌧️💧', bg:'rain'},
  63: {label:'Rain',              emoji:'🌧️💧', bg:'rain'},
  65: {label:'Heavy rain',        emoji:'🌧️💦', bg:'storm'},
  71: {label:'Light snow',        emoji:'🌨️', bg:'snow'},
  73: {label:'Snow',              emoji:'❄️', bg:'snow'},
  75: {label:'Heavy snow',        emoji:'❄️', bg:'snow'},
  77: {label:'Snow grains',       emoji:'❄️', bg:'snow'},
  80: {label:'Rain showers',      emoji:'🌧️💧', bg:'rain'},
  81: {label:'Rain showers',      emoji:'🌧️💧', bg:'rain'},
  82: {label:'Heavy showers',     emoji:'⛈️💦', bg:'storm'},
  85: {label:'Snow showers',      emoji:'🌨️', bg:'snow'},
  86: {label:'Snow showers',      emoji:'❄️', bg:'snow'},
  95: {label:'Thunderstorm',      emoji:'⛈️', bg:'storm'},
  96: {label:'Thunderstorm',      emoji:'⛈️', bg:'storm'},
  99: {label:'Thunderstorm',      emoji:'⛈️', bg:'storm'}
};

// Open-Meteo's weather_code can report rain or heavy cloud even when neither is real,
// because it comes straight from the model. We cross-check it against the ACTUAL
// precipitation (mm) and cloud cover (%).
// WMO bands: 0-12% clear, 13-50% partly cloudy, 51-87% mostly cloudy, 88%+ overcast.
// Rain/drizzle/shower codes (51-67, 80-82) are demoted to a cloud code if no rain is falling.
function reconcileCondition(code, cloudCover, precip) {
  const rainCodes = [51,53,55,56,57,61,63,65,66,67,80,81,82];
  // If the model claims rain but precipitation is essentially zero, it's not raining.
  if (rainCodes.includes(code) && precip != null && !isNaN(precip) && precip < 0.1) {
    // Fall back to a sky condition based on cloud cover instead of fake rain.
    code = (cloudCover != null && cloudCover > 50) ? 3 : 2;
  }
  // Adjust the "dry sky" codes using real cloud cover.
  if (![0, 1, 2, 3].includes(code) || cloudCover == null || isNaN(cloudCover)) {
    return code;
  }
  if (cloudCover <= 12) return 0;  // Clear
  if (cloudCover <= 50) return 2;  // Partly cloudy
  if (cloudCover <= 87) return 2;  // mostly cloudy — keep cloud icon, not overcast
  return 3;                        // Overcast
}

const aqiLevels = [
  {max:50,  label:'Good',                       color:'#2ecc71'},
  {max:100, label:'Moderate',                   color:'#f1c40f'},
  {max:150, label:'Unhealthy for sensitive',    color:'#e67e22'},
  {max:200, label:'Unhealthy',                  color:'#e74c3c'},
  {max:300, label:'Very unhealthy',             color:'#9b59b6'},
  {max:500, label:'Hazardous',                  color:'#7f0000'}
];

const uvLabel = uv => uv<3?'Low':uv<6?'Moderate':uv<8?'High':uv<11?'Very high':'Extreme';
const cToF = c => Math.round(c * 9/5 + 32);
const showT = c => useF ? cToF(c) : Math.round(c);

function isNight(now, sunrise, sunset) {
  const t = new Date(now).getTime();
  return t < new Date(sunrise).getTime() || t > new Date(sunset).getTime();
}

function setBackground(code, night) {
  const info = weatherCodes[code] || {bg:'cloudy'};
  document.body.className = '';
  if (info.bg === 'clear-day' && night) {
    document.body.classList.add('bg-clear-night');
  } else {
    document.body.classList.add('bg-' + info.bg);
  }
  // Animated overlays
  const rain = $('rain-overlay'), snow = $('snow-overlay');
  rain.classList.remove('active'); snow.classList.remove('active');
  rain.innerHTML = ''; snow.innerHTML = '';
  if (['rain','storm'].includes(info.bg)) {
    rain.classList.add('active');
    for (let i=0;i<60;i++) {
      const d = document.createElement('div'); d.className='drop';
      d.style.left = Math.random()*100+'%';
      d.style.height = (10+Math.random()*20)+'px';
      d.style.animationDuration = (0.4+Math.random()*0.6)+'s';
      d.style.animationDelay = Math.random()*2+'s';
      rain.appendChild(d);
    }
  } else if (info.bg === 'snow') {
    snow.classList.add('active');
    for (let i=0;i<40;i++) {
      const f = document.createElement('div'); f.className='flake'; f.textContent = '❄';
      f.style.left = Math.random()*100+'%';
      f.style.fontSize = (8+Math.random()*14)+'px';
      f.style.animationDuration = (4+Math.random()*6)+'s';
      f.style.animationDelay = Math.random()*5+'s';
      snow.appendChild(f);
    }
  }
}

async function geocode(query) {
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`);
  const d = await r.json();
  if (!d.results || !d.results.length) throw new Error('City not found: ' + query);
  return d.results[0];
}

async function reverseGeo(lat, lon) {
  // Open-Meteo doesn't reverse-geocode, but the geocoding API near coords works approximately.
  // Fallback: return coords as name.
  return { name: 'My location', latitude: lat, longitude: lon, country: '' };
}

// "City average" mode samples a 9-point grid across the city; "center only" uses 1 point.
let avgMode = (localStorage.getItem('weather_avg_mode') || 'city'); // 'city' | 'center'

// Build a grid of sample points spread across the city area.
// City mode: center + a ring of 8 points (~0.06° ≈ 6-7 km out) covering the whole footprint.
function buildGrid(lat, lon) {
  if (avgMode === 'center') return [{ lat, lon }];
  const d = 0.06;
  return [
    { lat: lat,     lon: lon     }, // center
    { lat: lat + d, lon: lon     }, // N
    { lat: lat - d, lon: lon     }, // S
    { lat: lat,     lon: lon + d }, // E
    { lat: lat,     lon: lon - d }, // W
    { lat: lat + d, lon: lon + d }, // NE
    { lat: lat + d, lon: lon - d }, // NW
    { lat: lat - d, lon: lon + d }, // SE
    { lat: lat - d, lon: lon - d }  // SW
  ];
}

// Open-Meteo accepts comma-separated lat/lon lists and returns an ARRAY of results,
// one per point — so we average across all of them in a single request.
async function getWeather(lat, lon) {
  const grid = buildGrid(lat, lon);
  const lats = grid.map(p => p.lat.toFixed(4)).join(',');
  const lons = grid.map(p => p.lon.toFixed(4)).join(',');

  const wUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,cloud_cover,precipitation,surface_pressure,uv_index&hourly=temperature_2m,weather_code,cloud_cover,precipitation,precipitation_probability&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum,sunrise,sunset&timezone=auto&forecast_days=7`;
  const aUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lats}&longitude=${lons}&current=us_aqi,pm10,pm2_5,carbon_monoxide,nitrogen_dioxide,sulphur_dioxide,ozone`;

  const [wR, aR] = await Promise.all([fetch(wUrl), fetch(aUrl)]);
  let wData = await wR.json();
  let aData = await aR.json();

  // When multiple coords are sent, the API returns an array. Normalize to arrays.
  const wArr = Array.isArray(wData) ? wData : [wData];
  const aArr = Array.isArray(aData) ? aData : [aData];

  const stationCount = wArr.length;

  // Average the "current" numeric fields across all grid points.
  const avg = (arr, getter) => {
    const vals = arr.map(getter).filter(v => v != null && !isNaN(v));
    return vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : null;
  };
  // Median is robust against one wild outlier point (e.g. a single PM10 spike
  // dragging the mean up). Used for pollutants where one bad reading shouldn't skew the city value.
  const median = (arr, getter) => {
    const vals = arr.map(getter).filter(v => v != null && !isNaN(v)).sort((a,b)=>a-b);
    if (!vals.length) return null;
    const mid = Math.floor(vals.length / 2);
    return vals.length % 2 ? vals[mid] : (vals[mid-1] + vals[mid]) / 2;
  };
  // Spread = min and max across points (shows how much the city varies).
  const spread = (arr, getter) => {
    const vals = arr.map(getter).filter(v => v != null && !isNaN(v));
    if (!vals.length) return null;
    return { min: Math.min(...vals), max: Math.max(...vals) };
  };
  // For weather_code, take the most common (mode) across points.
  const mode = (arr, getter) => {
    const counts = {};
    arr.forEach(o => { const v = getter(o); if (v != null) counts[v] = (counts[v] || 0) + 1; });
    let best = null, bestN = -1;
    for (const k in counts) if (counts[k] > bestN) { bestN = counts[k]; best = +k; }
    return best;
  };

  // Use the center point as the base (for time, hourly, daily, sun times), then overwrite
  // the current values with the city-wide averages.
  const base = wArr[0];
  const mergedWeather = {
    ...base,
    current: {
      time: base.current.time,
      temperature_2m:      avg(wArr, o => o.current.temperature_2m),
      relative_humidity_2m:avg(wArr, o => o.current.relative_humidity_2m),
      apparent_temperature:avg(wArr, o => o.current.apparent_temperature),
      // Condition reflects the searched location (city center), NOT a vote across
      // outlying grid points — averaging the sky condition was misleading.
      weather_code:        base.current.weather_code,
      cloud_cover:         avg(wArr, o => o.current.cloud_cover),
      precipitation:       avg(wArr, o => o.current.precipitation),
      surface_pressure:    avg(wArr, o => o.current.surface_pressure),
      uv_index:            avg(wArr, o => o.current.uv_index)
    }
  };

  // Average air quality across the grid too.
  const aBase = aArr[0];
  const mergedAir = {
    ...aBase,
    current: {
      us_aqi:           median(aArr, o => o.current && o.current.us_aqi),
      pm10:             median(aArr, o => o.current && o.current.pm10),
      pm2_5:            median(aArr, o => o.current && o.current.pm2_5),
      carbon_monoxide:  median(aArr, o => o.current && o.current.carbon_monoxide),
      nitrogen_dioxide: median(aArr, o => o.current && o.current.nitrogen_dioxide),
      sulphur_dioxide:  median(aArr, o => o.current && o.current.sulphur_dioxide),
      ozone:            median(aArr, o => o.current && o.current.ozone)
    }
  };

  // Per-point breakdown for the expandable detail panel.
  const labels = ['Center','N','S','E','W','NE','NW','SE','SW'];
  const points = grid.map((p, i) => ({
    label: labels[i] || ('P' + (i+1)),
    lat: p.lat, lon: p.lon,
    temp: wArr[i] && wArr[i].current ? wArr[i].current.temperature_2m : null,
    code: wArr[i] && wArr[i].current ? wArr[i].current.weather_code : null,
    aqi:  aArr[i] && aArr[i].current ? aArr[i].current.us_aqi : null
  }));

  const tempSpread = spread(wArr, o => o.current.temperature_2m);
  const aqiSpread  = spread(aArr, o => o.current && o.current.us_aqi);

  return { w: mergedWeather, a: mergedAir, stationCount, points, tempSpread, aqiSpread };
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit', hour12: true});
}

// Live local clock for the searched city, using the API's UTC offset.
let clockTimer = null;
let cityUtcOffsetSec = 0;
function startCityClock(offsetSeconds) {
  cityUtcOffsetSec = offsetSeconds || 0;
  if (clockTimer) clearInterval(clockTimer);
  const tick = () => {
    // Date.now() is UTC epoch ms. City wall-clock = UTC + city's offset.
    // Read with getUTC* so the device's own timezone never enters the calculation.
    const cityMs = Date.now() + cityUtcOffsetSec * 1000;
    const d = new Date(cityMs);
    let h = d.getUTCHours();
    const m = String(d.getUTCMinutes()).padStart(2, '0');
    const s = String(d.getUTCSeconds()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    const el = $('local-clock');
    if (el) el.textContent = `🕐 ${h}:${m}:${s} ${ampm} local time`;
  };
  tick();
  clockTimer = setInterval(tick, 1000);
}

function render(loc, weather, air, extra) {
  extra = extra || {};
  currentData = {
    loc, weather, air,
    stationCount: extra.stationCount || (currentData && currentData.stationCount) || 1,
    points: extra.points || (currentData && currentData.points),
    tempSpread: extra.tempSpread || (currentData && currentData.tempSpread),
    aqiSpread: extra.aqiSpread || (currentData && currentData.aqiSpread)
  };
  const c = weather.current;
  // Cross-check the model's condition against actual cloud cover to avoid false "cloudy".
  const effectiveCode = reconcileCondition(c.weather_code, c.cloud_cover, c.precipitation);
  const code = weatherCodes[effectiveCode] || {label:'Unknown', emoji:'❓'};
  const night = isNight(c.time, weather.daily.sunrise[0], weather.daily.sunset[0]);

  setBackground(effectiveCode, night);

  const locLabel = loc.name + (loc.admin1 ? ', ' + loc.admin1 : '') + (loc.country ? ', ' + loc.country : '');
  const count = currentData.stationCount || 1;
  const modeNote = avgMode === 'center'
    ? ` <span style="opacity:0.7;font-size:11px;">· city center</span>`
    : (count > 1 ? ` <span style="opacity:0.7;font-size:11px;">· avg of ${count} points across the city</span>` : '');
  $('loc').innerHTML = locLabel + modeNote;
  $('temp').textContent = showT(c.temperature_2m);
  $('temp-unit').textContent = useF ? '°F' : '°C';
  // Temperature spread across the city
  const ts = currentData.tempSpread;
  if (avgMode === 'city' && ts && (ts.max - ts.min) >= 0.5) {
    $('temp-spread').textContent = `ranges ${showT(ts.min)}°–${showT(ts.max)}° across the city`;
    $('temp-spread').style.display = 'block';
  } else {
    $('temp-spread').style.display = 'none';
  }
  const cloudPct = (c.cloud_cover != null && !isNaN(c.cloud_cover)) ? Math.round(c.cloud_cover) : null;
  $('cond').textContent = code.label + (cloudPct != null ? ` · ${cloudPct}% cloud` : '');
  $('hero-icon').textContent = (night && code.night) ? code.night : code.emoji;
  $('sunrise').textContent = formatTime(weather.daily.sunrise[0]);
  $('sunset').textContent = formatTime(weather.daily.sunset[0]);
  // Live local clock for this city (API provides utc_offset_seconds via timezone=auto)
  startCityClock(weather.utc_offset_seconds);

  $('feels').textContent = showT(c.apparent_temperature);
  document.querySelectorAll('.tu').forEach(el => el.textContent = useF ? '°F' : '°C');
  $('hum').textContent = Math.round(c.relative_humidity_2m) + '%';
  $('press').textContent = Math.round(c.surface_pressure) + ' hPa';
  $('uv').textContent = Math.round(c.uv_index);
  $('uv-label').textContent = uvLabel(c.uv_index);

  // Hourly - next 24 hours starting from current hour
  const nowIdx = weather.hourly.time.findIndex(t => new Date(t) >= new Date(c.time));
  const startIdx = Math.max(0, nowIdx);
  const hourHtml = [];
  for (let i = startIdx; i < Math.min(startIdx + 24, weather.hourly.time.length); i++) {
    const t = new Date(weather.hourly.time[i]);
    const isNow = i === startIdx;
    // Reconcile the hourly icon. A forecast hour can be tagged drizzle/rain even when
    // the chance of rain is low — so if probability is under 30%, show clouds, not rain.
    const rawHCode = weather.hourly.weather_code[i];
    const hCloud = weather.hourly.cloud_cover ? weather.hourly.cloud_cover[i] : null;
    const hPrecip = weather.hourly.precipitation != null ? weather.hourly.precipitation[i] : null;
    const hProb = weather.hourly.precipitation_probability != null ? weather.hourly.precipitation_probability[i] : null;
    const wetCodes = [51,53,55,56,57,61,63,65,66,67,80,81,82];
    let effHCode = rawHCode;
    if (wetCodes.includes(rawHCode) && (hProb == null || hProb < 30) && (hPrecip == null || hPrecip < 0.1)) {
      // Not enough chance AND no measurable rain -> it's not really wet, show sky instead.
      effHCode = (hCloud != null && hCloud > 50) ? 3 : 2;
    }
    const hCode = weatherCodes[reconcileCondition(effHCode, hCloud, hPrecip)] || {emoji:'❓'};
    const hourLabel = isNow ? 'Now' : t.toLocaleTimeString([], {hour:'numeric', hour12: true});
    const rainProb = weather.hourly.precipitation_probability[i];
    // Only flag rain when the chance is actually meaningful (>=30%), so a 10% chance
    // doesn't make it look like it's raining all day.
    const showRain = rainProb != null && rainProb >= 30;
    hourHtml.push(`<div class="hour">
      <div class="hour-time">${hourLabel}</div>
      <div class="hour-icon">${hCode.emoji}</div>
      <div class="hour-temp">${showT(weather.hourly.temperature_2m[i])}°</div>
      ${showRain ? `<div class="hour-rain">💧${rainProb}%</div>` : '<div class="hour-rain">&nbsp;</div>'}
    </div>`);
  }
  $('hourly').innerHTML = hourHtml.join('');

  // AQI
  if (air && air.current) {
    const aqi = Math.round(air.current.us_aqi);
    const level = aqiLevels.find(l => aqi <= l.max) || aqiLevels[aqiLevels.length - 1];
    $('aqi').textContent = aqi;
    $('aqi-label').textContent = level.label;
    $('aqi-label').style.background = level.color;
    $('aqi-fill').style.width = Math.min(100, (aqi / 300) * 100) + '%';
    $('aqi-fill').style.background = level.color;

    // Rough "normal vs high" thresholds (µg/m³) so a big-but-harmless number
    // (like CO, which is naturally in the hundreds-to-thousands) isn't alarming.
    const pollutants = [
      {name:'Fine particles', formula:'PM2.5', val:air.current.pm2_5, unit:'µg/m³', ok:35, bad:75},
      {name:'Coarse particles', formula:'PM10', val:air.current.pm10, unit:'µg/m³', ok:75, bad:150},
      {name:'Ozone', formula:'O₃', val:air.current.ozone, unit:'µg/m³', ok:100, bad:180},
      {name:'Nitrogen dioxide', formula:'NO₂', val:air.current.nitrogen_dioxide, unit:'µg/m³', ok:40, bad:100},
      {name:'Sulfur dioxide', formula:'SO₂', val:air.current.sulphur_dioxide, unit:'µg/m³', ok:50, bad:150},
      {name:'Carbon monoxide', formula:'CO', val:air.current.carbon_monoxide, unit:'µg/m³', ok:4000, bad:10000}
    ];
    const statusFor = p => {
      if (p.val == null) return {color:'#888', label:'—'};
      if (p.val <= p.ok)  return {color:'#2ecc71', label:'normal'};
      if (p.val <= p.bad) return {color:'#f1c40f', label:'elevated'};
      return {color:'#e74c3c', label:'high'};
    };
    $('pollutants').innerHTML = pollutants.map(p => {
      const s = statusFor(p);
      return `<div class="poll">
        <div class="poll-name">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${s.color};margin-right:4px;"></span>
          ${p.name} <span style="opacity:0.6;">(${p.formula})</span>
        </div>
        <div class="poll-val">${p.val != null ? p.val.toFixed(1) : '—'} <span class="poll-unit" title="micrograms per cubic meter — a mass concentration, not a count of particles">${p.unit}</span></div>
        <div style="font-size:10px;opacity:0.7;margin-top:2px;color:${s.color};">${s.label}</div>
      </div>`;
    }).join('');
  }

  // 7-day forecast
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  $('forecast').innerHTML = weather.daily.time.map((dateStr, i) => {
    const d = new Date(dateStr);
    const dn = i === 0 ? 'Today' : dayNames[d.getDay()];
    // Cross-check the day's rain icon against its total rainfall. A day labeled "rain"
    // with basically no rainfall (<1mm over the whole day) gets a cloud icon instead.
    const dayPrecip = weather.daily.precipitation_sum ? weather.daily.precipitation_sum[i] : null;
    const rawDayCode = weather.daily.weather_code[i];
    const rainCodes = [51,53,55,56,57,61,63,65,66,67,80,81,82];
    let dayCode = rawDayCode;
    if (rainCodes.includes(rawDayCode) && dayPrecip != null && dayPrecip < 1) {
      dayCode = 2; // partly cloudy instead of fake rain
    }
    const dCode = weatherCodes[dayCode] || {emoji:'❓'};
    return `<div class="day">
      <div class="day-name">${dn}</div>
      <div class="day-icon">${dCode.emoji}</div>
      <div class="day-hi">${showT(weather.daily.temperature_2m_max[i])}°</div>
      <div class="day-lo">${showT(weather.daily.temperature_2m_min[i])}°</div>
    </div>`;
  }).join('');

  // Per-point sample panel
  const pts = currentData.points;
  const toggleBtn = $('points-toggle');
  if (avgMode === 'city' && pts && pts.length > 1) {
    toggleBtn.style.display = 'inline-block';
    $('points-grid').innerHTML = pts.map(p => {
      const pc = weatherCodes[p.code] || {emoji:'❓'};
      return `<div style="background:rgba(255,255,255,0.1);border-radius:10px;padding:8px;text-align:center;">
        <div style="font-size:11px;opacity:0.8;">${p.label}</div>
        <div style="font-size:18px;margin:3px 0;">${pc.emoji}</div>
        <div style="font-size:14px;font-weight:500;">${p.temp != null ? showT(p.temp) + '°' : '—'}</div>
        <div style="font-size:10px;opacity:0.7;">AQI ${p.aqi != null ? Math.round(p.aqi) : '—'}</div>
      </div>`;
    }).join('');
  } else {
    toggleBtn.style.display = 'none';
    $('points-panel').classList.add('hidden');
  }

  $('content').classList.remove('hidden');
  $('status').classList.add('hidden');
  renderFavs();
}

function renderFavs() {
  const currentName = currentData ? currentData.loc.name : null;
  const favHtml = favorites.map(f =>
    `<button class="fav ${f.name === currentName ? 'active' : ''}" data-name="${f.name}">
      ${f.name}
      <span class="fav-remove" data-remove="${f.name}" title="Remove">×</span>
    </button>`
  ).join('');
  const addBtn = currentData && !favorites.find(f => f.name === currentData.loc.name)
    ? `<button class="fav fav-add" id="add-fav">+ Save current</button>` : '';
  $('favs').innerHTML = favHtml + addBtn;

  document.querySelectorAll('.fav[data-name]').forEach(btn => {
    btn.addEventListener('click', e => {
      if (e.target.dataset.remove) return;
      const fav = favorites.find(f => f.name === btn.dataset.name);
      if (fav) loadByCoords(fav);
    });
  });
  document.querySelectorAll('[data-remove]').forEach(x => {
    x.addEventListener('click', e => {
      e.stopPropagation();
      favorites = favorites.filter(f => f.name !== x.dataset.remove);
      localStorage.setItem('weather_favs', JSON.stringify(favorites));
      renderFavs();
    });
  });
  const add = $('add-fav');
  if (add) add.addEventListener('click', () => {
    if (!currentData) return;
    const loc = currentData.loc;
    favorites.push({ name: loc.name, latitude: loc.latitude, longitude: loc.longitude, admin1: loc.admin1, country: loc.country });
    localStorage.setItem('weather_favs', JSON.stringify(favorites));
    renderFavs();
  });
}

async function loadCity(query) {
  $('status').textContent = 'Loading weather...';
  $('status').classList.remove('hidden', 'error');
  $('content').classList.add('hidden');
  try {
    const loc = await geocode(query);
    const res = await getWeather(loc.latitude, loc.longitude);
    render(loc, res.w, res.a, res);
  } catch (e) {
    $('status').textContent = e.message || 'Something went wrong';
    $('status').classList.add('error');
  }
}

async function loadByCoords(loc) {
  $('status').textContent = 'Loading weather...';
  $('status').classList.remove('hidden', 'error');
  $('content').classList.add('hidden');
  try {
    const res = await getWeather(loc.latitude, loc.longitude);
    render(loc, res.w, res.a, res);
  } catch (e) {
    $('status').textContent = e.message || 'Something went wrong';
    $('status').classList.add('error');
  }
}

// Expand/collapse the per-point sample readings.
$('points-toggle').addEventListener('click', () => {

  $('points-toggle').textContent = hidden ? '📍 Show sample points' : '📍 Hide sample points';
});
$('geo-btn').addEventListener('click', () => {
  if (!navigator.geolocation) {
    $('status').textContent = 'Geolocation is not supported in this browser. Please search a city instead.';
    $('status').classList.remove('hidden');
    $('status').classList.add('error');
    $('content').classList.add('hidden');
    return;
  }
  $('status').textContent = 'Getting your location...';
  $('status').classList.remove('hidden', 'error');
  $('content').classList.add('hidden');
  navigator.geolocation.getCurrentPosition(
    async pos => {
      const { latitude, longitude } = pos.coords;
      try {
        const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?latitude=${latitude}&longitude=${longitude}&count=1&language=en&format=json`);
        const d = await r.json();
        const loc = (d.results && d.results[0]) || { name:'My location', latitude, longitude, country:'' };
        loc.latitude = latitude; loc.longitude = longitude;
        const res = await getWeather(latitude, longitude);
        render(loc, res.w, res.a, res);
      } catch (e) {
        const loc = { name:'My location', latitude, longitude, country:'' };
        const res = await getWeather(latitude, longitude);
        render(loc, res.w, res.a, res);
      }
    },
    err => {
      let msg;
      if (err.code === 1) {
        msg = 'Location permission was denied. Allow location access in your browser, or just search a city below.';
      } else if (err.code === 2) {
        msg = 'Could not determine your location. Try searching a city instead.';
      } else if (err.code === 3) {
        msg = 'Location request timed out. Try again or search a city.';
      } else if (err.message && err.message.includes('permissions policy')) {
        msg = 'Location is blocked in this preview. It will work once you deploy to GitHub Pages. For now, search a city.';
      } else {
        msg = 'Could not get location: ' + (err.message || 'unknown error') + '. Try searching a city instead.';
      }
      $('status').textContent = msg;
      $('status').classList.add('error');
      // Keep previous content visible if we had any
      if (currentData) {
        $('content').classList.remove('hidden');
        setTimeout(() => $('status').classList.add('hidden'), 5000);
      }
    }
  );
});

// Generate the blocky voxel-world background — floating 3D cubes in Roblox-style colors.
function buildVoxelWorld() {
  const bg = $('voxel-bg');
  if (!bg) return;
  const palette = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abcde','#ff6b9d'];
  const count = 18;
  for (let i = 0; i < count; i++) {
    const size = 30 + Math.random() * 60;
    const color = palette[Math.floor(Math.random() * palette.length)];
    const left = Math.random() * 100;
    const dur = 14 + Math.random() * 16;
    const delay = -Math.random() * dur;
    const cube = document.createElement('div');
    cube.className = 'voxel';
    cube.style.cssText = `left:${left}%;width:${size}px;height:${size}px;--half:${size/2}px;` +
      `animation-duration:${dur}s;animation-delay:${delay}s;`;
    ['top','front','side'].forEach(f => {
      const face = document.createElement('div');
      face.className = 'face ' + f;
      face.style.background = color;
      cube.appendChild(face);
    });
    bg.appendChild(cube);
  }
}
buildVoxelWorld();

// Build three original blocky characters (my own designs, Roblox-style boxy look):
// a hard-hat Builder, a sunglasses Cool Kid, and a glowing-eyed Shadow figure.
function buildCharacters() {
  const row = $('char-row');
  if (!row) return;

  // Each character: skin, shirt, pants colors + optional hat/accessory + eye style.
  const chars = [
    { // Builder — hard hat + hi-vis vest
      skin:'#e8b98a', shirt:'#f5a623', pants:'#34495e', arm:'#e8b98a',
      hat:{ top:'#f1c40f', brim:'#d4a30c' }, eyes:'#1a1a1a', glow:false, delay:0
    },
    { // Cool Kid — cap + sunglasses + hoodie
      skin:'#d9a06b', shirt:'#2ecc71', pants:'#2c3e50', arm:'#d9a06b',
      hat:{ top:'#e74c3c', brim:'#c0392b' }, eyes:'#111', glow:false, shades:true, delay:0.6
    },
    { // Shadow figure — all dark with glowing eyes
      skin:'#2c2c34', shirt:'#1a1a22', pants:'#111', arm:'#2c2c34',
      hat:null, eyes:'#00e6ff', glow:true, delay:1.2
    }
  ];

  chars.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'blocky';
    el.style.animationDelay = ch.delay + 's';

    const hat = ch.hat
      ? `<div class="hat" style="background:${ch.hat.top}"></div><div class="brim" style="background:${ch.hat.brim}"></div>`
      : '';

    const eyeStyle = ch.glow ? `background:${ch.eyes};color:${ch.eyes};` : `background:${ch.eyes};`;
    const eyeClass = ch.glow ? 'face-dot glow-eye' : 'face-dot';
    const shades = ch.shades
      ? `<div style="position:absolute;top:11px;left:6px;right:6px;height:7px;background:#111;border-radius:2px;"></div>`
      : `<div class="${eyeClass} eye-l" style="${eyeStyle}"></div><div class="${eyeClass} eye-r" style="${eyeStyle}"></div>`;

    el.innerHTML = `
      ${hat}
      <div class="head" style="background:${ch.skin}">${shades}</div>
      <div class="arms">
        <div class="arm" style="background:${ch.arm}"></div>
        <div class="arm" style="background:${ch.arm}"></div>
      </div>
      <div class="torso" style="background:${ch.shirt}"></div>
      <div class="legs">
        <div class="leg" style="background:${ch.pants}"></div>
        <div class="leg" style="background:${ch.pants}"></div>
      </div>`;
    row.appendChild(el);
  });
}
buildCharacters();

// Initial load: first favorite, or Gurugram
if (favorites.length > 0) {
  loadByCoords(favorites[0]);
} else {
  loadCity('Gurugram');
}
</script>
